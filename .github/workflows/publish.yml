name: Publish
run-name: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'Dry Run' || 'Publish' }}

on:
    release:
        types: [released]
    workflow_dispatch:
        inputs:
            dry_run:
                description: "Run without publishing to npm"
                type: boolean
                default: false

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
              with:
                  version: 9
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"
                  registry-url: "https://registry.npmjs.org"
            - run: pnpm install --frozen-lockfile
            - run: pnpm run build
            - run: pnpm run test
            - run: pnpm exec playwright install --with-deps chromium
            - run: pnpm run test:e2e
            - run: pnpm publish --no-git-checks --access public ${{ inputs.dry_run && '--dry-run' || '' }}
